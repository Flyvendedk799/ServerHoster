name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create release + upload artifacts
  packages: write # push to GHCR
  id-token: write # cosign keyless OIDC

jobs:
  # ------------------------------------------------------------------
  # 1. Build the published bundle once on Linux. The output is a single
  #    tarball (`localsurv-<version>.tgz` from `npm pack` + a raw tar
  #    of dist + LICENSE + README) shared with downstream jobs.
  # ------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Compute version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          SURVHUB_SECRET_KEY: ci-test-secret-key-do-not-use-in-prod
      - name: npm pack
        run: npm pack --workspace @survhub/server
      - name: Bundle raw tarball
        run: |
          mkdir -p release-staging
          cp survhub-server-*.tgz release-staging/
          tar -czf "release-staging/localsurv-${{ steps.meta.outputs.version }}-source.tar.gz" \
            apps packages packaging install.sh install.ps1 Dockerfile LICENSE README.md package.json package-lock.json
      - name: Generate SHA256SUMS
        working-directory: release-staging
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: release-staging
          path: release-staging/

  # ------------------------------------------------------------------
  # 2. Build & push the multi-arch Docker image. The same tag becomes
  #    `:latest`. Image digest is pinned alongside SHA256SUMS so users
  #    can verify it.
  # ------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.build.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

  # ------------------------------------------------------------------
  # 3. Sign all release-staging artifacts with cosign (keyless OIDC).
  #    The resulting .sig files ship alongside SHA256SUMS in the
  #    GitHub release for users (and `install.sh`) to verify.
  # ------------------------------------------------------------------
  sign:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-staging
          path: release-staging/
      - uses: sigstore/cosign-installer@v3
      - name: Sign SHA256SUMS
        working-directory: release-staging
        run: |
          cosign sign-blob --yes SHA256SUMS \
            --output-certificate SHA256SUMS.pem \
            --output-signature SHA256SUMS.sig
      - uses: actions/upload-artifact@v4
        with:
          name: release-signed
          path: |
            release-staging/SHA256SUMS
            release-staging/SHA256SUMS.pem
            release-staging/SHA256SUMS.sig

  # ------------------------------------------------------------------
  # 4a. macOS .pkg builder. Always builds an unsigned .pkg. If
  #     APPLE_DEVELOPER_ID is configured, also signs and (with
  #     APPLE_NOTARY_PROFILE) notarizes + staples.
  # ------------------------------------------------------------------
  macos-pkg:
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          SURVHUB_SECRET_KEY: ci-test-secret-key-do-not-use-in-prod
      - name: Register notary credentials (when secrets present)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_P8: ${{ secrets.APPLE_NOTARY_KEY_P8 }}
        run: |
          if [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_NOTARY_KEY_P8" ]; then
            echo "Apple notarization secrets not configured; skipping."
            exit 0
          fi
          printf '%s' "$APPLE_NOTARY_KEY_P8" | base64 -d > /tmp/AuthKey.p8
          xcrun notarytool store-credentials localsurv \
            --key /tmp/AuthKey.p8 \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID"
      - name: Build .pkg
        env:
          VERSION: ${{ needs.build.outputs.version }}
          PKG_OUT: dist/localsurv-${{ needs.build.outputs.version }}.pkg
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
        run: bash packaging/macos/build-pkg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: dist/*.pkg

  # ------------------------------------------------------------------
  # 4b. Windows .msi builder via WiX 4. Always builds an unsigned .msi.
  #     Signs with signtool when CODE_SIGNING_THUMBPRINT is configured
  #     and the cert is already imported into the LocalMachine store
  #     (the import is the user's responsibility — runners are
  #     ephemeral, so cert import is per-run).
  # ------------------------------------------------------------------
  windows-msi:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          SURVHUB_SECRET_KEY: ci-test-secret-key-do-not-use-in-prod
      - name: Install WiX 4 CLI
        run: dotnet tool install --global wix
      - name: Build .msi
        env:
          CODE_SIGNING_THUMBPRINT: ${{ secrets.CODE_SIGNING_THUMBPRINT }}
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          .\packaging\windows\build-msi.ps1 -Version "${{ needs.build.outputs.version }}" -OutFile "dist\localsurv-${{ needs.build.outputs.version }}.msi"
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/*.msi

  # ------------------------------------------------------------------
  # 5. Publish the GitHub Release with all artifacts attached. This is
  #    the final source of truth users (and install.sh) reach.
  # ------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [build, docker, sign, macos-pkg, windows-msi]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-staging
          path: release-artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: release-signed
          path: release-artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: macos-pkg
          path: release-artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: release-artifacts/
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/*

  # ------------------------------------------------------------------
  # 6. Optional: publish the npm tarball when NPM_TOKEN is configured.
  #    Off-by-default so forks don't accidentally publish.
  # ------------------------------------------------------------------
  npm-publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
        env:
          SURVHUB_SECRET_KEY: ci-test-secret-key-do-not-use-in-prod
      - name: Publish (skips if NPM_TOKEN not set)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set; skipping publish."
            exit 0
          fi
          npm publish --workspace @survhub/server --provenance --access public
