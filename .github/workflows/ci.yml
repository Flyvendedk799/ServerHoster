name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck (server)
        run: npx tsc --noEmit -p apps/server/tsconfig.json

      - name: Build all workspaces
        run: npm run build
        env:
          SURVHUB_SECRET_KEY: ci-test-secret-key-do-not-use-in-prod

      - name: Server tests
        if: runner.os != 'Windows'
        run: npm run test -w @survhub/server
        env:
          SURVHUB_SECRET_KEY: ci-test-secret-key-do-not-use-in-prod
          SURVHUB_DATA_DIR: /tmp/survhub-ci

      - name: Server tests (Windows)
        if: runner.os == 'Windows'
        run: npm run test -w @survhub/server
        env:
          SURVHUB_SECRET_KEY: ci-test-secret-key-do-not-use-in-prod
          SURVHUB_DATA_DIR: ${{ runner.temp }}\survhub-ci

      - name: Web smoke tests
        run: npm run test:smoke -w @survhub/web
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check

  readiness-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify release-gates manifest (verify:readiness)
        run: npm run verify:readiness
      - name: Upload readiness scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readiness-scorecard
          path: ops/readiness-scorecard.json
          if-no-files-found: warn

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: localsurv:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test image
        run: |
          # Image should at least surface its CLI version without crashing.
          docker run --rm --entrypoint node localsurv:ci /app/apps/server/dist/cli.js version

  homebrew-smoke:
    runs-on: macos-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Audit Homebrew formula
        run: |
          brew tap-new local/test || true
          cp packaging/Formula/localsurv.rb "$(brew --repository local/test)/Formula/localsurv.rb"
          brew audit --strict --formula local/test/localsurv || true
        continue-on-error: true

  packaging-smoke:
    name: Packaging smoke
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install.sh shellcheck + parse
        run: |
          bash -n install.sh
          if command -v shellcheck >/dev/null 2>&1; then shellcheck install.sh || true; fi
      - name: install.ps1 PowerShell parse check
        shell: pwsh
        run: |
          $tokens = $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path 'install.ps1'), [ref]$tokens, [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) { $errors | ForEach-Object { Write-Error $_.Message }; exit 1 }
      - name: Inspect macOS .pkg builder syntax
        run: bash -n packaging/macos/build-pkg.sh
      - name: Inspect Windows builder PowerShell syntax
        shell: pwsh
        run: |
          $tokens = $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path 'packaging/windows/build-msi.ps1'), [ref]$tokens, [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) { $errors | ForEach-Object { Write-Error $_.Message }; exit 1 }
