name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build all workspaces
        run: npm run build
        env:
          SURVHUB_SECRET_KEY: ci-test-secret-key-do-not-use-in-prod

      - name: Server tests
        run: npm run test -w @survhub/server
        env:
          SURVHUB_SECRET_KEY: ci-test-secret-key-do-not-use-in-prod
          SURVHUB_DATA_DIR: /tmp/survhub-ci

      - name: Web smoke tests
        run: npm run test:smoke -w @survhub/web
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Format check
        run: npm run format:check
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: localsurv:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true
